<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | Web Explorer</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2240%22 fill=%22white%22/></svg>">
    <style>
        :root {
            --bg-color: #020617;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --glass: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(56, 189, 248, 0.04) 0%, transparent 40%),
                radial-gradient(circle at 85% 85%, rgba(139, 92, 246, 0.04) 0%, transparent 40%);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .hero {
            text-align: center;
            z-index: 10;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0 1.5rem;
        }

        .hero h1 {
            font-size: 8rem; /* Massive Font */
            font-weight: 900;
            letter-spacing: -0.06em;
            margin: 0;
            background: linear-gradient(to bottom, #fff 40%, #475569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 0.9;
        }

        .hero p {
            color: #475569;
            font-size: 1.5rem;
            margin: 1.5rem 0 4rem;
            font-weight: 300;
            letter-spacing: 0.02em;
        }

        .btn-main {
            background: #fff;
            color: #020617;
            padding: 1.5rem 4rem;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn-main:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 20px 60px rgba(255, 255, 255, 0.15);
        }

        /* The Curved Explorer */
        .explorer-side {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 40px; 
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            pointer-events: auto;
        }

        .explorer-side:hover {
            width: 500px;
        }

        .moon-panel {
            position: absolute;
            right: -500px;
            width: 600px;
            height: 90vh;
            background: rgba(15, 23, 42, 0.1);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 100% 0 0 100%;
            border: 1px solid var(--glass-border);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
            opacity: 0;
        }

        .explorer-side:hover .moon-panel {
            right: -200px;
            opacity: 1;
            pointer-events: auto;
        }

        .dial-container {
            position: absolute;
            right: 220px; 
            top: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
        }

        .site-card {
            position: absolute;
            right: 0;
            top: 0;
            width: 240px;
            padding: 1rem 1.5rem;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: #94a3b8;
            font-size: 0.9rem;
            transform-origin: 1200px center; /* Even flatter curve */
            pointer-events: auto;
            transition: opacity 0.4s ease, transform 0.4s ease, border-color 0.3s ease;
            margin-top: -30px;
            opacity: 0;
        }

        .site-card:hover {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .site-card .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 15px;
            box-shadow: 0 0 12px currentColor;
        }

        .site-card .cat {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            margin-bottom: 2px;
        }

        /* Lazy Doc & Stats */
        .lazy-doc {
            position: fixed;
            bottom: 3rem;
            left: 3rem;
            max-width: 250px;
            z-index: 5;
        }

        .lazy-doc h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .lazy-doc p {
            font-size: 0.85rem;
            color: #334155;
            margin: 0;
            line-height: 1.5;
        }

        .stats-badge {
            position: fixed;
            top: 3rem;
            left: 3rem;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Explorer toggle button – hidden on desktop */
        .explorer-toggle {
            display: none;
            position: fixed;
            bottom: 2rem;
            right: 1.5rem;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(56, 189, 248, 0.12);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 300;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .explorer-toggle:hover { background: rgba(56, 189, 248, 0.22); }

        /* Panel header – hidden on desktop */
        .panel-header {
            display: none;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        .panel-header span {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .panel-close {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.4rem 0.6rem;
            opacity: 0.5;
            line-height: 1;
        }

        .panel-close:hover { opacity: 1; }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .hero h1 { font-size: 4rem; }
            .hero p { font-size: 1.1rem; margin: 1rem 0 2.5rem; }
            .btn-main {
                padding: 1.2rem 0;
                font-size: 1rem;
                width: 100%;
                max-width: 280px;
                min-height: 52px;
            }
            .lazy-doc { bottom: 5rem; left: 1.5rem; }
            .stats-badge { top: 1.5rem; left: 1.5rem; }

            /* Show tap-toggle button */
            .explorer-toggle { display: flex; }

            /* Disable hover-triggered expansion on mobile */
            .explorer-side {
                width: 0;
                pointer-events: none;
            }
            .explorer-side:hover { width: 0; }

            /* Full-screen overlay when active */
            .explorer-side.active { pointer-events: auto; }

            .moon-panel {
                position: fixed;
                right: 0;
                top: 0;
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                background: rgba(2, 6, 23, 0.97);
                transform: translateX(100%);
                transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.45s;
                display: flex;
                flex-direction: column;
            }

            .explorer-side.active .moon-panel {
                transform: translateX(0);
                opacity: 1;
                pointer-events: auto;
            }

            /* Show panel header on mobile */
            .panel-header { display: flex; }

            /* Scrollable flat card list */
            .dial-container {
                position: static;
                width: 100%;
                height: auto;
                flex: 1;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                padding: 0.75rem 1.25rem 1.25rem;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
                gap: 0.5rem;
            }

            /* Cards as flat list items */
            .site-card {
                position: static;
                width: auto;
                margin: 0;
                transform: none !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                transform-origin: unset;
            }
        }

        @media (max-width: 480px) {
            .hero h1 { font-size: 2.8rem; }
            .hero p { font-size: 0.95rem; }
        }
    </style>
</head>
<body>
    <div class="stats-badge">100+ Nodes Sync'd</div>

    <div class="hero">
        <div id="loader" style="font-size: 0.7rem; font-weight: 800; color: var(--accent-color); letter-spacing: 0.3em; margin-bottom: 2rem; opacity: 0">AETHER GATE OPENING...</div>
        <h1>AETHER</h1>
        <p>Internet curiosities, found.</p>
        <button class="btn-main" onclick="teleport()">Launch</button>
    </div>

    <div class="explorer-side">
        <div class="moon-panel">
            <div class="panel-header">
                <span>Explorer</span>
                <button class="panel-close" onclick="toggleExplorer()" aria-label="Close explorer">✕</button>
            </div>
            <div class="dial-container" id="dial">
                <!-- JS populated -->
            </div>
        </div>
    </div>

    <button class="explorer-toggle" id="explorerToggle" aria-label="Open explorer" onclick="toggleExplorer()">☰</button>

    <div class="lazy-doc">
        <h3>Lazy Doc</h3>
        <p>Click <b>Launch</b> for luck. Hover <b>Right Edge</b> &amp; scroll to browse. On mobile, tap <b>☰</b> to explore.</p>
    </div>

    <script>
        const sites = [
            { url: 'https://neal.fun', cat: 'Creative' },
            { url: 'https://theuselessweb.com', cat: 'Chaos' },
            { url: 'https://pointerpointer.com', cat: 'Interactive' },
            { url: 'https://zoomquilt.org', cat: 'Art' },
            { url: 'https://patatap.com', cat: 'Music' },
            { url: 'https://lusion.co', cat: 'Visuals' },
            { url: 'https://bruno-simon.com', cat: '3D' },
            { url: 'https://resn.co.nz', cat: 'Design' },
            { url: 'https://active-theory.com', cat: 'WebGL' },
            { url: 'https://locomotive.ca', cat: 'Animation' },
            { url: 'https://moxy.studio', cat: 'Motion' },
            { url: 'https://kprverse.com', cat: 'Immersive' },
            { url: 'https://toyfight.co', cat: 'Studio' },
            { url: 'https://sync.studio', cat: 'Layouts' },
            { url: 'https://geoguessr.com', cat: 'Games' },
            { url: 'https://littlealchemy2.com', cat: 'Puzzle' },
            { url: 'https://slither.io', cat: 'Action' },
            { url: 'https://tetr.io', cat: 'Arcade' },
            { url: 'https://krunker.io', cat: 'FPS' },
            { url: 'https://classicreload.com', cat: 'Retro' },
            { url: 'https://slowroads.io', cat: 'Sim' },
            { url: 'https://fallingfalling.com', cat: 'Endless' },
            { url: 'https://fallingguy.com', cat: 'Physics' },
            { url: 'https://cat-bounce.com', cat: 'Cats' },
            { url: 'https://earth.nullschool.net', cat: 'Earth' },
            { url: 'https://window-swap.com', cat: 'Travel' },
            { url: 'https://flightradar24.com', cat: 'Data' },
            { url: 'https://marinetraffic.com', cat: 'Ocean' },
            { url: 'https://skyview.gsfc.nasa.gov', cat: 'Space' },
            { url: 'https://earthcam.com', cat: 'Live' },
            { url: 'https://google.com/earth', cat: 'World' },
            { url: 'https://worldometers.info', cat: 'Stats' },
            { url: 'https://everysecond.io', cat: 'Real-time' },
            { url: 'https://ocearch.org', cat: 'Nature' },
            { url: 'https://internet-map.net', cat: 'Web' },
            { url: 'https://archive.org', cat: 'Library' },
            { url: 'https://wolframalpha.com', cat: 'Science' },
            { url: 'https://map.snapchat.com', cat: 'Local' },
            { url: 'https://everynoise.com', cat: 'Audio' },
            { url: 'https://virustotal.com', cat: 'Security' },
            { url: 'https://tinyurl.com', cat: 'Utility' },
            { url: 'https://futureme.org', cat: 'Time' },
            { url: 'https://geacron.com', cat: 'History' },
            { url: 'https://musclewiki.com', cat: 'Health' },
            { url: 'https://tastedive.com', cat: 'Discovery' },
            { url: 'https://thetruesize.com', cat: 'Maps' },
            { url: 'https://hackertyper.com', cat: 'Sim' },
            { url: 'https://listening.io', cat: 'Audio' },
            { url: 'https://rainymood.com', cat: 'Zen' },
            { url: 'https://pixelthoughts.co', cat: 'Calm' },
            { url: 'https://paperplanes.world', cat: 'Social' },
            { url: 'https://asoftmurmur.com', cat: 'Ambience' },
            { url: 'https://coffitivity.com', cat: 'Cafe' },
            { url: 'https://puginarug.com', cat: 'Pug' },
            { url: 'https://thebeatles.com', cat: 'Music' },
            { url: 'https://screamintothevoid.com', cat: 'Catharsis' },
            { url: 'https://isitchristmas.com', cat: 'Vital' },
            { url: 'https://thatsthefinger.com', cat: 'Rude' },
            { url: 'https://heeeeeeeey.com', cat: 'Heeeeey' },
            { url: 'https://procatinator.com', cat: 'Cats+' },
            { url: 'https://windows93.net', cat: 'Retro OS' }
        ];

        let rotation = 0;
        const angleStep = 7; // Even tighter for many items

        function isMobile() { return window.innerWidth <= 768; }

        function init() {
            const dial = document.getElementById('dial');
            sites.sort((a,b) => a.cat.localeCompare(b.cat)).forEach((site, i) => {
                const card = document.createElement('a');
                card.href = site.url;
                card.target = '_blank';
                card.className = 'site-card';
                card.dataset.angle = i * angleStep;
                
                const hue = (i * 137.5) % 360;
                card.innerHTML = `
                    <div class="dot" style="background: hsl(${hue}, 70%, 60%); color: hsl(${hue}, 70%, 60%)"></div>
                    <div>
                        <div class="cat">${site.cat}</div>
                        <div>${new URL(site.url).hostname.replace('www.', '')}</div>
                    </div>
                `;
                dial.appendChild(card);
            });
            updateDial();
        }

        function updateDial() {
            const cards = document.querySelectorAll('.site-card');
            if (isMobile()) {
                // On mobile cards are shown as a flat list via CSS; clear any inline styles set by desktop dial
                cards.forEach(card => {
                    card.style.transform = '';
                    card.style.opacity = '';
                    card.style.pointerEvents = '';
                });
                return;
            }
            const totalSpan = sites.length * angleStep;
            
            cards.forEach(card => {
                const baseAngle = parseFloat(card.dataset.angle);
                let currentAngle = (baseAngle + rotation) % totalSpan;
                
                if (currentAngle < -totalSpan / 2) currentAngle += totalSpan;
                if (currentAngle > totalSpan / 2) currentAngle -= totalSpan;
                
                const distFromCenter = Math.abs(currentAngle);
                const maxRange = 35;
                let opacity = 0;
                let scale = 0.8;

                if (distFromCenter < maxRange) {
                    opacity = 1 - (distFromCenter / maxRange);
                    scale = 1 - (distFromCenter / maxRange) * 0.2;
                }

                card.style.transform = `rotate(${currentAngle}deg) scale(${scale})`;
                card.style.opacity = opacity;
                card.style.pointerEvents = opacity > 0.4 ? 'auto' : 'none';
            });
        }

        window.addEventListener('wheel', (e) => {
            if (isMobile()) return;
            rotation -= e.deltaY * 0.05;
            updateDial();
        }, { passive: true });

        window.addEventListener('resize', updateDial);

        function toggleExplorer() {
            const side = document.querySelector('.explorer-side');
            const toggle = document.getElementById('explorerToggle');
            const isOpen = side.classList.toggle('active');
            toggle.textContent = isOpen ? '✕' : '☰';
            toggle.setAttribute('aria-label', isOpen ? 'Close explorer' : 'Open explorer');
        }

        function teleport() {
            const random = sites[Math.floor(Math.random() * sites.length)];
            const loader = document.getElementById('loader');
            loader.style.opacity = '1';
            
            document.querySelector('.hero').style.opacity = '0.3';

            setTimeout(() => {
                window.open(random.url, '_blank');
                loader.style.opacity = '0';
                document.querySelector('.hero').style.opacity = '1';
            }, 800);
        }

        init();
    </script>
</body>
</html>
